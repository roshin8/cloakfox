<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Cloakfox Shield - Test Runner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace; background: #0d1117; color: #c9d1d9; padding: 20px; font-size: 13px; }
    h1 { color: #58a6ff; margin-bottom: 16px; font-size: 18px; }
    .scenario { margin: 8px 0; padding: 10px 12px; border-radius: 6px; border: 1px solid #30363d; }
    .scenario.pass { border-color: #238636; background: #0d1117; }
    .scenario.fail { border-color: #da3633; background: #1c0b0b; }
    .scenario.running { border-color: #d29922; background: #1c1500; }
    .scenario.pending { opacity: 0.5; }
    .scenario-name { font-weight: 600; margin-bottom: 4px; }
    .scenario-detail { font-size: 11px; color: #8b949e; white-space: pre-wrap; max-height: 150px; overflow: auto; }
    .status { float: right; font-size: 11px; font-weight: 600; }
    .status.pass { color: #3fb950; }
    .status.fail { color: #f85149; }
    .status.running { color: #d29922; }
    #summary { margin: 16px 0; padding: 12px; border-radius: 6px; background: #161b22; font-weight: 600; }
    #progress { margin-bottom: 12px; color: #8b949e; }
    .screenshot { max-width: 100%; border: 1px solid #30363d; border-radius: 4px; margin-top: 6px; }
  </style>
</head>
<body>
  <h1>Cloakfox Shield Test Runner</h1>
  <div style="margin-bottom: 12px; display: flex; gap: 8px;">
    <button onclick="location.search='?fresh=1'" style="padding: 4px 12px; border-radius: 4px; background: #21262d; border: 1px solid #30363d; color: #c9d1d9; cursor: pointer; font-size: 12px;">Run Fresh</button>
    <button onclick="location.search=''" style="padding: 4px 12px; border-radius: 4px; background: #21262d; border: 1px solid #30363d; color: #c9d1d9; cursor: pointer; font-size: 12px;">Resume</button>
  </div>
  <div id="progress">Initializing...</div>
  <div id="summary"></div>
  <div id="scenarios"></div>
  <script src="./test-runner.ts" type="module"></script>
</body>
</html>
