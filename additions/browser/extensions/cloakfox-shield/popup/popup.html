<!DOCTYPE html>
<!-- Cloakfox toolbar popup — tab-aware indicator. -->
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Cloakfox</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <h1>Cloakfox</h1>
    <span id="cfx-status" class="status">—</span>
  </header>

  <section id="tab-info">
    <div class="row">
      <span class="label">Container</span>
      <span id="cfx-container" class="value">—</span>
    </div>
    <div class="row">
      <span class="label">This tab</span>
      <span id="cfx-url" class="value url">—</span>
    </div>
  </section>

  <section id="actions">
    <button id="cfx-open-settings" class="primary">Open full settings</button>
    <p class="hint">
      Spoofing is per-container. Open settings to inspect or
      regenerate seeds for the active container.
    </p>
  </section>

  <script src="popup.js"></script>
</body>
</html>
