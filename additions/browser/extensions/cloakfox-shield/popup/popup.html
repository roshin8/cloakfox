<!DOCTYPE html>
<!-- Cloakfox toolbar popup. -->
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Cloakfox</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <div class="brand">
      <span class="brand-mark">⬢</span>
      <span class="brand-name">Cloakfox</span>
    </div>
    <span id="cfx-status" class="status">—</span>
  </header>

  <section id="tab-info">
    <div class="row">
      <span class="label">Container</span>
      <span id="cfx-container" class="value">—</span>
    </div>
    <div class="row">
      <span class="label">This tab</span>
      <span id="cfx-url" class="value url">—</span>
    </div>
  </section>

  <section id="persona-preview">
    <div class="preview-eyebrow">Active persona <span id="cfx-seed-tag" class="seed-tag"></span></div>
    <div id="cfx-persona-preview" class="preview-body">…</div>
    <button id="cfx-popup-regen" class="btn-primary">New persona</button>
  </section>

  <section id="actions">
    <button id="cfx-open-settings" class="btn-secondary">Open full settings →</button>
  </section>

  <p id="cfx-popup-err" class="err" hidden></p>

  <script src="popup.js"></script>
</body>
</html>
