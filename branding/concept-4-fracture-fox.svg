<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="90" fill="#18181B"/>
  <!-- Fox head made of shards with gaps between them -->
  <!-- Left ear shard -->
  <polygon points="175,150 210,100 225,195" fill="#8B5CF6" transform="translate(-2,-2)"/>
  <!-- Right ear shard -->
  <polygon points="337,150 302,100 287,195" fill="#06B6D4" transform="translate(2,-2)"/>
  <!-- Left cheek shard -->
  <polygon points="165,210 225,195 240,300 190,340 160,290" fill="#10B981" transform="translate(-3,1)"/>
  <!-- Right cheek shard -->
  <polygon points="347,210 287,195 272,300 322,340 352,290" fill="#F59E0B" transform="translate(3,1)"/>
  <!-- Forehead shard -->
  <polygon points="225,195 256,160 287,195 272,240 240,240" fill="#EC4899" transform="translate(0,-3)"/>
  <!-- Nose/mouth shard -->
  <polygon points="240,300 256,250 272,300 256,370" fill="#EF4444" transform="translate(0,3)"/>
  <!-- Center face shard -->
  <polygon points="240,240 272,240 272,300 256,250 240,300" fill="#8B5CF6" opacity="0.7" transform="translate(0,0)"/>
  <!-- Eyes -->
  <circle cx="218" cy="258" r="10" fill="#F8FAFC" transform="translate(-3,1)"/>
  <circle cx="294" cy="258" r="10" fill="#F8FAFC" transform="translate(3,1)"/>
  <circle cx="218" cy="258" r="5" fill="#18181B" transform="translate(-3,1)"/>
  <circle cx="294" cy="258" r="5" fill="#18181B" transform="translate(3,1)"/>
  <!-- Text -->
  <text x="256" y="450" text-anchor="middle" font-family="SF Pro Display, Helvetica Neue, sans-serif" font-size="36" font-weight="600" fill="#F8FAFC" letter-spacing="8">CLOAKFOX</text>
  <!-- Subtitle -->
  <text x="256" y="480" text-anchor="middle" font-family="SF Pro Display, Helvetica Neue, sans-serif" font-size="14" fill="#71717A" letter-spacing="4">SHATTER THE FINGERPRINT</text>
</svg>
