<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <clipPath id="leftHalf"><rect x="0" y="0" width="253" height="512"/></clipPath>
    <clipPath id="rightHalf"><rect x="259" y="0" width="253" height="512"/></clipPath>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="90" fill="#1A1A2E"/>
  <!-- Split line reveal -->
  <rect x="253" y="100" width="6" height="312" fill="#F5F5F5" rx="3" opacity="0.8"/>
  <!-- Left half - warm -->
  <g clip-path="url(#leftHalf)">
    <!-- Ear -->
    <polygon points="180,140 220,100 240,200" fill="#E94560"/>
    <polygon points="180,140 220,130 240,200" fill="#D63447"/>
    <!-- Face -->
    <polygon points="170,200 240,200 256,360 200,380 170,320" fill="#E94560"/>
    <polygon points="170,200 200,220 200,300 170,320" fill="#D63447"/>
    <polygon points="200,300 256,360 200,380" fill="#B91C3A"/>
    <!-- Eye -->
    <circle cx="215" cy="255" r="14" fill="#FFD93D"/>
    <circle cx="218" cy="252" r="6" fill="#1A1A2E"/>
  </g>
  <!-- Right half - cool (offset 3px right) -->
  <g clip-path="url(#rightHalf)">
    <!-- Ear -->
    <polygon points="335,140 295,100 275,200" fill="#0F3460"/>
    <polygon points="335,140 295,130 275,200" fill="#16213E"/>
    <!-- Face -->
    <polygon points="345,200 275,200 259,360 315,380 345,320" fill="#0F3460"/>
    <polygon points="345,200 315,220 315,300 345,320" fill="#16213E"/>
    <polygon points="315,300 259,360 315,380" fill="#0A1A3A"/>
    <!-- Eye -->
    <circle cx="300" cy="255" r="14" fill="#FFD93D"/>
    <circle cx="303" cy="252" r="6" fill="#1A1A2E"/>
  </g>
  <!-- Nose hints -->
  <polygon points="248,320 256,340 253,330" fill="#D63447" opacity="0.7"/>
  <polygon points="264,320 256,340 259,330" fill="#0F3460" opacity="0.7"/>
  <!-- Text -->
  <text x="256" y="450" text-anchor="middle" font-family="SF Pro Display, Helvetica Neue, sans-serif" font-size="36" font-weight="600" fill="#F5F5F5" letter-spacing="8">CLOAKFOX</text>
</svg>
