<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="90" fill="#0A0A0A"/>
  <!-- Fox silhouette path (reused for all 3) -->
  <defs>
    <path id="fox" d="M-80,-120 L-50,-170 L-20,-110 L0,-140 L20,-110 L50,-170 L80,-120 L70,-20 L50,40 Q30,60 0,50 Q-30,60 -50,40 L-70,-20Z"/>
  </defs>
  <!-- Fox 3 - yellow (back) -->
  <use href="#fox" x="280" y="280" fill="#FFE66D" opacity="0.4"/>
  <!-- Fox 2 - teal (middle) -->
  <use href="#fox" x="256" y="260" fill="#4ECDC4" opacity="0.4"/>
  <!-- Fox 1 - red (front) -->
  <use href="#fox" x="232" y="240" fill="#FF6B6B" opacity="0.4"/>
  <!-- Bright convergence point (where all 3 overlap = eyes area) -->
  <circle cx="245" cy="230" r="6" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="267" cy="230" r="6" fill="#FFFFFF" opacity="0.9"/>
  <!-- Second set of eyes (offset) -->
  <circle cx="257" cy="240" r="4" fill="#4ECDC4" opacity="0.5"/>
  <circle cx="279" cy="240" r="4" fill="#4ECDC4" opacity="0.5"/>
  <circle cx="269" cy="250" r="4" fill="#FFE66D" opacity="0.5"/>
  <circle cx="291" cy="250" r="4" fill="#FFE66D" opacity="0.5"/>
  <!-- Text -->
  <text x="256" y="440" text-anchor="middle" font-family="SF Pro Display, Helvetica Neue, sans-serif" font-size="36" font-weight="600" fill="#FFFFFF" letter-spacing="8">CLOAKFOX</text>
  <text x="256" y="470" text-anchor="middle" font-family="SF Pro Display, Helvetica Neue, sans-serif" font-size="14" fill="#555" letter-spacing="4">MANY FACES. NO FINGERPRINTS.</text>
</svg>
