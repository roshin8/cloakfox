// Cloakfox — AutoConfig preferences
// This file is loaded by local-settings.js via the AutoConfig mechanism.

// ==== Daily-Driver Features ====

// Search and URL bar
pref("browser.urlbar.suggest.searches", true);
pref("browser.urlbar.suggest.history", true);
pref("browser.urlbar.suggest.bookmark", true);
pref("browser.urlbar.suggest.topsites", true);
pref("browser.urlbar.maxRichResults", 10);

// New tab page
pref("browser.newtabpage.enabled", true);
pref("browser.newtabpage.activity-stream.feeds.topsites", true);

// Passwords and forms
pref("signon.rememberSignons", true);
pref("browser.formfill.enable", true);

// Reader mode
pref("reader.parse-on-load.enabled", true);

// Tab management
pref("browser.tabs.warnOnClose", true);
pref("browser.tabs.tabmanager.enabled", true);

// Spell check
pref("layout.spellcheckDefault", 1);

// CSS animations (ensure enabled — Cloakfox may disable)
pref("ui.prefersReducedMotion", 0);

// Extensions
pref("extensions.enabledScopes", 15);
pref("extensions.autoDisableScopes", 0);

// Pin Cloakfox Shield to toolbar by default
defaultPref("browser.uiCustomization.state", '{"placements":{"widget-overflow-fixed-list":[],"unified-extensions-area":[],"nav-bar":["back-button","forward-button","stop-reload-button","urlbar-container","search-container","downloads-button","cloakfox-shield_cloakfox-browser-action","unified-extensions-button"],"toolbar-menubar":["menubar-items"],"TabsToolbar":["tabbrowser-tabs","new-tab-button","alltabs-button"],"PersonalToolbar":["personal-bookmarks"]},"seen":["developer-button","cloakfox-shield_cloakfox-browser-action"],"dirtyAreaCache":["nav-bar"],"currentVersion":20,"newElementCount":0}');

// ==== Privacy Hardening ====

// DO NOT enable resistFingerprinting — conflicts with C++ patches
// RFP makes everyone identical; we want per-container uniqueness
pref("privacy.resistFingerprinting", false);

// Container support (critical — foundation of identity isolation)
pref("privacy.userContext.enabled", true);
pref("privacy.userContext.ui.enabled", true);

// Cookie isolation (dynamic First-Party Isolation)
pref("network.cookie.cookieBehavior", 5);

// Strict referrer policy
pref("network.http.referer.XOriginPolicy", 2);

// No geolocation by default
pref("geo.enabled", false);

// No remote debugging
pref("devtools.debugger.remote-enabled", false);

// Disable telemetry endpoints
pref("toolkit.telemetry.enabled", false);
pref("toolkit.telemetry.unified", false);
pref("toolkit.telemetry.archive.enabled", false);

// Disable safe browsing lookups (privacy, not security risk for advanced users)
pref("browser.safebrowsing.malware.enabled", false);
pref("browser.safebrowsing.phishing.enabled", false);

// Disable prefetch
pref("network.prefetch-next", false);
pref("network.dns.disablePrefetch", true);

// ==== Content-only media-query baseline ====
// Web content sees neutral values — browser UI keeps the user's real
// OS theme and accessibility settings.
//
// prefers-color-scheme has a native Firefox content-only pref:
pref("layout.css.prefers-color-scheme.content-override", 0);  // content: light, UI: OS
//
// Other LookAndFeel signals don't have a separate content-only pref.
// The extension can override them per-container via the
// lookandfeel-spoofing C++ patch (MaskConfig keys lookAndFeel:*),
// but those affect BOTH UI and content. We intentionally do NOT pin
// them at the pref level so the user's real OS theme still drives UI
// (you'd get a dark-UI dark-theme user experience if your OS is dark).
// Trade-off: real OS accessibility settings leak to web when the
// extension isn't setting the per-container keys.

// ==== Timer precision ====
// Coarse timing defeats high-resolution timing-based fingerprints.
pref("privacy.reduceTimerPrecision", true);
pref("privacy.resistFingerprinting.reduceTimerPrecision.microseconds", 1000);

// ==== Build ID pin ====
// navigator.buildID is the Firefox build timestamp — leaks the exact
// installed version. Pin to a constant (Firefox's own RFP spoof value).
pref("general.buildID.override", "20181001000000");

// ==== Font prefetching / fallback metrics ====
// Default font list leaks OS fonts via CSS fallback detection.
pref("font.system.whitelist", "");  // no system-font bypass

// ==== Misc fingerprint-relevant prefs ====
pref("dom.enable_resource_timing", false);           // hides per-resource timing
pref("dom.enable_user_timing", true);                // harmless, enabled
pref("dom.webaudio.enabled", true);                  // required
pref("media.peerconnection.enabled", true);          // WebRTC patched
pref("media.peerconnection.ice.default_address_only", true);  // no mDNS leak
pref("dom.battery.enabled", false);                  // hide Battery API entirely

// ==== Master enable for cpp-first JSWindowActors ====
// All Cloakfox JSWindowActors check this pref at entry and bail when
// false. Default true means out-of-box installs get full fingerprint
// protection in the default container (and any pre-existing user
// containers) without requiring a visit to about:cloakfox first.
// User can flip to false via about:config or the about:cloakfox UI
// to disable all spoofing globally (e.g. for debugging).
defaultPref("cloakfox.enabled", true);

// ==== Timezone spoofing ====
// Firefox has no built-in pref to override timezone (intl.timezone.
// override doesn't exist; verified via grep in modules/libpref/init/
// all.js). The only override path is the C++ window.setTimezone()
// WebIDL setter from patches/timezone-spoofing.patch. CloakfoxTimezone
// JSWindowActor calls it on every DOMDocElementInserted with the per-
// container value (default: UTC). Once called, the C++ TimezoneManager
// persists the value in RoverfoxStorageManager and disables the setter
// for that userContextId — Date / Intl.DateTimeFormat / getTimezoneOffset
// all read from the persisted value.
//
// To set a non-UTC timezone for a container, set
//   cloakfox.container.<ucid>.timezone = "America/New_York"
// (any IANA name). The about:cloakfox UI is the intended writer.

// ==== WebRTC public-IP leak (known limitation) ====
// patches/webrtc-ip-spoofing.patch exposes window.setWebRTCIPv4(<ip>)
// and window.setWebRTCIPv6(<ip>) — per-container WebIDL setters that
// scrub real public IPs from ICE candidate gathering AND getStats()
// (PeerConnectionImpl.cpp::CandidateReady, GetStats). With no setter
// called, real public IPs leak via STUN-derived srflx candidates.
//
// Why no defaultPref equivalent: WebRTC needs at least one externally-
// reachable IP to do NAT traversal for direct P2P. Forcing relay_only
// (TURN-only) breaks every video-call app that doesn't ship a TURN
// server. media.peerconnection.enabled=false kills WebRTC entirely
// (matches Tor Browser; breaks Meet/Zoom/Discord-web/Whereby).
//
// Default position: keep WebRTC functional, accept that any site
// initiating a peer connection sees the real public IP. For users
// who need stronger isolation, either:
//   - Set media.peerconnection.enabled=false in about:config (kills
//     WebRTC), OR
//   - Use about:cloakfox to set per-container fake IP (planned actor
//     CloakfoxWebRTC will call setWebRTCIPv4 with the configured value).

// ==== HTTP/2 fingerprint spoofing (experimental, off by default) ====
// Values: "firefox" (default, no change), "chrome", "safari"
// Controls the three inputs to the Akamai h2fingerprint hash:
//   - SETTINGS frame — which IDs are sent, in what order, with what values
//   - Session WINDOW_UPDATE value after SETTINGS
//   - HPACK pseudo-header order (:method / :authority / :scheme / :path)
// Profile signatures:
//   firefox  SETTINGS=1,2,3?,4,5,9?    WINDOW_UPDATE=mInitialRwin  HPACK=m,p,a,s
//   chrome   SETTINGS=1,2,3,4,6        WINDOW_UPDATE=15663105      HPACK=m,a,s,p
//   safari   SETTINGS=2,3,4            WINDOW_UPDATE=10485760      HPACK=m,s,p,a
// Leave as "firefox" for the default daily-driver experience. Enable
// chrome/safari if you need to bypass Cloudflare / Akamai / PerimeterX
// bot checks that fingerprint HTTP/2. Some sites may behave differently.
// MUST be defaultPref(), not pref(). AutoConfig's pref() in Mozilla
// semantics clobbers user values on every startup — so if the extension
// (or selenium, or an about:config edit) flips this to "chrome", the
// next startup resets it back. defaultPref() only seeds the default,
// which the user value then overrides.
defaultPref("network.http.http2.fingerprint_profile", "firefox");

// ==== HTTP/3 fingerprint spoofing (experimental, off by default) ====
// Parallel to the H2 profile pref above. Integer-valued because static_prefs
// (consumed by the Rust neqo glue) cannot bind to string prefs:
//   0 => firefox (default — original neqo SETTINGS emission)
//   1 => chrome  (Chrome-style SETTINGS frame)
//   2 => safari  (sparse Safari-style SETTINGS frame)
// Takes effect on new HTTP/3 connections (existing connections keep old values).
// Combine with the H2 profile for coherent transport fingerprint.
// defaultPref() — same reason as above, user value must survive restart.
defaultPref("network.http.http3.fingerprint_profile", 0);

// ==== MV3 builtin-addon auto-grant for host_permissions ====
// cloakfox-shield is the only MV3 builtin addon in this tree.
// Firefox's MV3 code path sets originControls=true which treats
// host_permissions as *optional* — content_scripts.matchPatterns
// stays 0 at runtime unless an auto-grant fires at install time.
// The auto-grant requires either granted_host_permissions:true in
// the manifest (present, see additions/browser/extensions/
// cloakfox-shield/manifest.json) OR this pref set true. Belt-and-
// suspenders because auto-grant only fires on ADDON_INSTALL and
// some profile-migration paths land via APP_STARTUP instead.
defaultPref("extensions.originControls.grantByDefault", true);
